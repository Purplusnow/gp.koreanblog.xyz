<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>과거 추천 게임 목록</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>과거 추천 게임 목록</h1>
      <p class="sub">
        과거에 추천했던 게임의 누적 목록입니다.
      </p>
      <p class="sub">
        <a href="./index.html">메인 목록으로 돌아가기</a>
      </p>
      <p id="updatedAt" class="updated">마지막 업데이트: 불러오는 중...</p>
    </header>

    <section class="controls">
      <input id="searchInput" type="text" placeholder="게임명, 개발사로 빠르게 찾기" />
      <select id="sortSelect">
        <option value="desc">추천일 최신순</option>
        <option value="asc">추천일 오래된순</option>
      </select>
    </section>

    <section>
      <div id="stats" class="stats"></div>
      <div id="appList" class="app-list"></div>
    </section>
  </div>

  <script src="./archive.js?v=2"></script>
</body>
</html>
