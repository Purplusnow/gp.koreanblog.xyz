<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>냥이오락실 추천 게임 목록</title>
  <link rel="stylesheet" href="./style.css" />

  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4640178123605595"
    crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>냥이오락실 추천 게임 목록</h1>
      <p class="sub">
        모바일 게임을 빠르게 발견하고, 리뷰까지 바로 이어서 볼 수 있는 큐레이션 목록입니다.
      </p>

      <div class="ad-box top-ad">
        <ins class="adsbygoogle"
          style="display:block"
          data-ad-client="ca-pub-4640178123605595"
          data-ad-slot="3482050864"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
      </div>

      <p id="updatedAt" class="updated">마지막 업데이트: 불러오는 중...</p>
    </header>

    <section class="controls">
      <input id="searchInput" type="text" placeholder="게임명, 개발사로 빠르게 찾기" />
      <select id="sortSelect">
        <option value="desc">추천일 최신순</option>
        <option value="asc">추천일 오래된순</option>
      </select>
    </section>

    <section>
      <div id="stats" class="stats"></div>
      <div id="appList" class="app-list"></div>
    </section>

    <div class="ad-box bottom-ad">
      <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-4640178123605595"
        data-ad-slot="3482050864"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>
    </div>
  </div>

  <script src="./app.js?v=21"></script>
</body>
</html>
